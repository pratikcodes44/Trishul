# =====================================================
# Project Trishul - Docker Compose
# =====================================================
# Usage:
#   docker-compose up -d arena     # Start vulnerable test server
#   docker-compose run trishul --demo  # Run demo mode
# =====================================================

services:
  # Main Trishul scanner
  trishul:
    build: .
    container_name: trishul
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./reports:/app/reports
    networks:
      - trishul-net
    stdin_open: true
    tty: true

  # Vulnerable test server for demos
  arena:
    build: .
    container_name: trishul-arena
    command: ["python", "vulnerable_arena.py"]
    ports:
      - "5000:5000"
    networks:
      - trishul-net

  # Unified Next.js Frontend
  dashboard:
    build: .
    container_name: trishul-dashboard
    command: ["sh", "-lc", "cd frontend && npm install && npm run dev -- --port 3000 --hostname 0.0.0.0"]
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    networks:
      - trishul-net

networks:
  trishul-net:
    driver: bridge
